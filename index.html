<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vite App</title>
</head>

<body>
  <style>
    @font-face {
      font-family: monospace;
      src: url(monograph.ttf);
    }

    /* hello */
    body {
      font-family: "Courier New", Courier, monospace;
      font-size: 2rem;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #textbox {
      position: absolute;
      left: 10%;
      right: 10%;
      bottom: 2vh;
      min-height: 10vh;
      background: white;
      border-radius: 3px;
      outline-style: solid;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      justify-content: flex-start;
      align-items: flex-start;
      word-spacing: 0.2rem;
      filter: drop-shadow(0 0 0.75rem rgb(112, 112, 112));
    }

    .ui-text {
      margin: 0;
      user-select: none;
    }

    .ui-close-btn {
      font-family: inherit;
      border: 2px solid #555;
      background-color: #333;
      color: white;
      border-radius: 6px;
      padding: 0.5rem 1.5rem;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 2px 2px 0px #111;
    }

    .ui-close-btn:active {
      transform: translateY(2px);
      box-shadow: 0px 0px 0px #111;
    }

    .btn-container {
      align-self: flex-end;
      margin-top: 1rem;
    }

    .note {
      position: absolute;
      left: 5%;
      top: 1vh;
      display: flex;
      flex-direction: column;
      color: rgb(255, 255, 255);
      text-shadow:
        /* hello */
        -1px -1px 0 black, 1px -1px 0 black,
        -1px 1px 0 black, 1px 1px 0 black;
      user-select: none;
      display: none;
    }
  </style>
  <div id="app">
    <div id="ui">
      <p class="note">
        <span>WASD/Arrows: Move</span>
        <span>M: Swift Slash</span>
        <span>,: Titan Cleave</span>
        <span>.: Blade Storm</span>
        <span>/: The World (Stop Time)</span>
        <span>T: Revive Pet (Near TV)</span>

        <span>Space: Dialogue</span>
        <span>Tab: Inventory / Pause</span>
      </p>
      <div id="textbox-container" style="display: none">
        <div id="textbox">
          <p id="dialogue" class="ui-text"></p>
          <div class="btn-container">
            <button id="close" class="ui-close-btn">Next ▶</button>
          </div>
        </div>
      </div>
    </div>
    <canvas id="game"></canvas>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
